<!DOCTYPE html>
<html>
<head>
    <title>House Price Prediction</title>

    <style>
        body{
            font-family: Arial;
            background-color:#f2f2f2;
            text-align:center;
            padding-top:50px;
        }

        .container{
            background:white;
            width:400px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
            border-radius:5px;
            border:1px solid gray;
        }

        button{
            padding:10px 20px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        h1{
            color:#333;
        }
    </style>
</head>


<body>

<div class="container">

<h1>House Price Prediction</h1>

<form action="/predict" method="post">

    <input type="text" name="sqft" placeholder="Total Square Feet" required>

    <input type="text" name="bath" placeholder="Number of Bathrooms" required>

    <input type="text" name="balcony" placeholder="Number of Balconies" required>

    <input type="text" name="bhk" placeholder="Number of BHK" required>

    <br><br>

    <button type="submit">Predict Price</button>

</form>

<br>

<h2>{{ prediction_text }}</h2>

</div>

</body>
</html>
